services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-artemis}
      POSTGRES_PASSWORD: ${DB_PASS:-artemis}
      POSTGRES_DB: ${DB_NAME:-artemis_transcripts}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    env_file:
      - .env
    environment:
      TRANSCRIPTS_DB_ENABLED: "true"
      DB_HOST: db
      DATA_DIR: /app/source_files
      LLM_DEBUG_PROMPTS_DIR: /app/.local
    volumes:
      - ./prompts:/app/prompts:ro
      - ./source_files:/app/source_files:ro
      - ./.local/query-set:/app/.local/query-set
      - ./.local/query-receive:/app/.local/query-receive
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: docker/client/Dockerfile

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8080:80"
      - "80:80"
      - "8443:443"
      - "443:443"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./.ssl:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - server

volumes:
  db_data:
