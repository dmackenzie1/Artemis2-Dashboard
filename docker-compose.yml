services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-artemis}
      POSTGRES_PASSWORD: ${DB_PASS:-artemis}
      POSTGRES_DB: ${DB_NAME:-artemis_transcripts}
    volumes:
      - ./docker/db/data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: docker/server/Dockerfile
    env_file:
      - .env
    environment:
      TRANSCRIPTS_DB_ENABLED: "true"
      DB_HOST: db
    volumes:
      - ./sample_data:/app/sample_data:ro
      - ./prompts:/app/prompts:ro
      - ./docker/server/data:/app/data
      - ./TB-Artemis-Summaries:/app/TB-Artemis-Summaries:ro
      - ./source_files:/app/source_files:ro
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: docker/client/Dockerfile

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
